name: Proctor SMART - Intelligent Proxy Collector

env:
  FORCE_JAVASCRIPT_ACTIONS_TO_NODE24: true

on:
  schedule:
    - cron: '*/2 * * * *'       # Сбор каждые 2 минуты
  workflow_dispatch:            # Ручной запуск

jobs:
  proctor-run:
    name: 🔍 Proctor - Full Pipeline
    runs-on: ubuntu-latest
    permissions:
      contents: write
    
    steps:
    - name: Checkout repository
      uses: actions/checkout@v4
      with:
        fetch-depth: 0

    - name: Set up Python
      uses: actions/setup-python@v5
      with:
        python-version: '3.10'

    - name: Install dependencies
      run: |
        pip install --upgrade pip
        pip install aiohttp aiohttp-socks httpx requests beautifulsoup4 lxml fake-useragent colorama pandas openpyxl

    - name: Create directories
      run: mkdir -p core data logs reports

    - name: Run proxy collection
      run: python rapid_main.py
      continue-on-error: true

    - name: Generate Markdown report
      run: python rapid_report_md.py
      continue-on-error: true

    - name: Find new sources (every 30 min, skip on schedule to avoid conflicts)
      if: github.event_name != 'schedule' || github.event.schedule == '*/30 * * * *'
      run: python find_sources.py
      continue-on-error: true

    - name: Commit and push changes
      run: |
        git config user.name 'github-actions[bot]'
        git config user.email 'github-actions[bot]@users.noreply.github.com'
        
        git add data/ reports/ *.txt 2>/dev/null || true
        
        if git diff --staged --quiet; then
          echo "ℹ️ No changes to commit"
        else
          git commit -m "🔄 Proctor update: $(date +'%Y-%m-%d %H:%M UTC')"
          git pull --rebase origin main || true
          git push origin main
          echo "✅ Changes pushed"
        fi
