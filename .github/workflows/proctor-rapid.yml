  smart-report:
    name: 📊 Generate Excel Report
    runs-on: ubuntu-latest
    if: github.event.schedule == '0 */6 * * *' || github.event_name == 'workflow_dispatch'
    permissions:
      contents: write
    steps:
    - uses: actions/checkout@v4
    - uses: actions/setup-python@v5
      with:
        python-version: '3.10'
    - name: Install ALL dependencies
      run: |
        pip install --upgrade pip
        pip install aiohttp aiohttp-socks requests beautifulsoup4 lxml fake-useragent colorama pandas openpyxl
    - name: Create directories
      run: mkdir -p core data logs reports
    - name: Generate report
      run: python rapid_report.py
      continue-on-error: true
    - name: Commit report
      run: |
        git config user.name 'github-actions[bot]'
        git config user.email 'github-actions[bot]@users.noreply.github.com'
        git add reports/*.xlsx 2>/dev/null || true
        if git diff --staged --quiet; then
          echo "ℹ️ No new report"
        else
          git commit -m "📊 Report: $(date +'%Y-%m-%d %H:%M')"
          git fetch origin main
          git rebase origin/main
          git push origin main
        fi
