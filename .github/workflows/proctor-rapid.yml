  # 🧹 УДАЛЕНИЕ НЕРАБОЧИХ - каждые 8 минут
  smart-clean:
    name: 🧹 Remove Dead Proxies
    runs-on: ubuntu-latest
    if: github.event.schedule == '*/8 * * * *' || github.event_name == 'workflow_dispatch'
    permissions:
      contents: write
    steps:
    - uses: actions/checkout@v4
    - uses: actions/setup-python@v5
      with:
        python-version: '3.10'
    - name: Install ALL dependencies
      run: |
        pip install --upgrade pip
        pip install aiohttp aiohttp-socks requests beautifulsoup4 lxml fake-useragent colorama
    - name: Run cleanup
      run: python rapid_clean.py
      continue-on-error: true
    - name: Commit cleanup
      run: |
        git config user.name 'github-actions[bot]'
        git config user.email 'github-actions[bot]@users.noreply.github.com'
        git add data/*.txt data/*.json 2>/dev/null || true
        if git diff --staged --quiet; then
          echo "ℹ️ No changes"
        else
          git commit -m "🧹 Cleanup: $(date +'%H:%M')"
          git fetch origin main
          git rebase origin/main
          git push origin main
        fi
