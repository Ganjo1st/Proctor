  # 🔎 ПОИСК НОВЫХ ИСТОЧНИКОВ - каждые 30 минут
  smart-find-sources:
    name: 🔎 Find New Sources
    runs-on: ubuntu-latest
    if: github.event.schedule == '*/30 * * * *' || github.event_name == 'workflow_dispatch'
    permissions:
      contents: write
    steps:
    - uses: actions/checkout@v4
    - uses: actions/setup-python@v5
      with:
        python-version: '3.10'
    - name: Install ALL dependencies
      run: |
        pip install --upgrade pip
        pip install aiohttp aiohttp-socks requests beautifulsoup4 lxml fake-useragent colorama
    - name: Create directories
      run: mkdir -p core data
    - name: Find new sources
      run: python find_sources.py
      continue-on-error: true
    - name: Commit sources
      run: |
        git config user.name 'github-actions[bot]'
        git config user.email 'github-actions[bot]@users.noreply.github.com'
        git add data/sources.json 2>/dev/null || true
        if git diff --staged --quiet; then
          echo "ℹ️ No new sources"
        else
          git commit -m "🔎 New sources: $(date +'%H:%M')"
          git fetch origin main
          git rebase origin/main
          git push origin main
        fi
