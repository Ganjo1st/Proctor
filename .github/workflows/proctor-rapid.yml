  # 📊 ЕДИНЫЙ ОТЧЁТ - каждые 2 минуты
  smart-report:
    name: 📊 Update Report
    runs-on: ubuntu-latest
    if: github.event.schedule == '*/2 * * * *' || github.event_name == 'workflow_dispatch'
    permissions:
      contents: write
    steps:
    - uses: actions/checkout@v4
      with:
        fetch-depth: 0
    - uses: actions/setup-python@v5
      with:
        python-version: '3.10'
    - name: Install dependencies
      run: |
        pip install --upgrade pip
        pip install aiohttp aiohttp-socks httpx requests beautifulsoup4 lxml fake-useragent colorama pandas openpyxl
    - name: Create directories
      run: mkdir -p core data logs reports
    - name: Generate Markdown report
      run: python rapid_report_md.py
      continue-on-error: true
    - name: Commit report
      run: |
        git config user.name 'github-actions[bot]'
        git config user.email 'github-actions[bot]@users.noreply.github.com'
        git fetch origin main
        git rebase origin/main || true
        git add reports/proxy_report.md 2>/dev/null || true
        if git diff --staged --quiet; then
          echo "ℹ️ No changes"
        else
          git commit -m "📊 Report update: $(date +'%H:%M')"
          git push origin main || git push --force origin main
        fi
